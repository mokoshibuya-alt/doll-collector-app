<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人形 素材保存</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 480px; margin: 0 auto; padding: 20px; background:#fafafa; color:#222; }
  h1 { font-size: 1.3rem; }
  label { display:block; margin-top: 18px; font-weight: bold; font-size: 0.95rem; }
  input[type=text], select { width: 100%; padding: 12px; font-size: 1rem; box-sizing: border-box; margin-top:6px; border:1px solid #ccc; border-radius:8px; background:#fff; }
  input[type=file] { margin-top: 8px; }
  img#preview { max-width: 100%; margin-top: 12px; border-radius: 10px; display:none; }
  button { margin-top: 24px; width: 100%; padding: 15px; font-size: 1.1rem; background:#1a73e8; color:#fff; border:none; border-radius:10px; }
  button:active { background:#1558b0; }
  #status { margin-top: 14px; color: #555; font-size: 0.9rem; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>人形 素材保存</h1>

<label for="photo">写真</label>
<input type="file" id="photo" accept="image/*">
<img id="preview" alt="preview">

<label for="category">カテゴリ</label>
<select id="category">
  <option value="jirori">jirori</option>
  <option value="kao-charm">kao-charm</option>
  <option value="__new__">＋ 新規カテゴリを入力</option>
</select>
<input type="text" id="newCategory" placeholder="新しいカテゴリ名(ローマ字推奨)" style="display:none; margin-top:8px;">

<label for="charname">キャラ名(マイクボタンで話してOK)</label>
<input type="text" id="charname" placeholder="例: ゆって">

<label for="catch">キャッチコピー(マイクボタンで話してOK)</label>
<input type="text" id="catch" placeholder="例: 仕事休みたい言い訳がほしい人形">

<button id="saveBtn">保存(共有)する</button>
<div id="status"></div>

<script>
const photoInput = document.getElementById('photo');
const preview = document.getElementById('preview');
const categorySelect = document.getElementById('category');
const newCategoryInput = document.getElementById('newCategory');
const charInput = document.getElementById('charname');
const catchInput = document.getElementById('catch');
const saveBtn = document.getElementById('saveBtn');
const statusEl = document.getElementById('status');

categorySelect.addEventListener('change', () => {
  newCategoryInput.style.display = categorySelect.value === '__new__' ? 'block' : 'none';
});

photoInput.addEventListener('change', () => {
  const file = photoInput.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
});

function timestamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { resolve(img); URL.revokeObjectURL(url); };
    img.onerror = reject;
    img.src = url;
  });
}

async function createCaptionedImage(file, charName, catchCopy) {
  const img = await loadImage(file);
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const barHeight = Math.max(canvas.height * 0.2, 140);
  const gradient = ctx.createLinearGradient(0, canvas.height - barHeight, 0, canvas.height);
  gradient.addColorStop(0, 'rgba(0,0,0,0)');
  gradient.addColorStop(1, 'rgba(0,0,0,0.8)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, canvas.height - barHeight, canvas.width, barHeight);

  const padding = canvas.width * 0.05;
  const nameFontSize = Math.round(canvas.width * 0.06);
  const catchFontSize = Math.round(canvas.width * 0.042);
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = '#ffffff';

  let y = canvas.height - padding;
  if (catchCopy) {
    ctx.font = `${catchFontSize}px sans-serif`;
    ctx.fillText(catchCopy, padding, y);
    y -= catchFontSize * 1.5;
  }
  if (charName) {
    ctx.font = `bold ${nameFontSize}px sans-serif`;
    ctx.fillText(charName, padding, y);
  }

  return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
}

function downloadFile(file) {
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;
  a.download = file.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

saveBtn.addEventListener('click', async () => {
  const file = photoInput.files[0];
  if (!file) {
    statusEl.textContent = '写真を選んでください';
    return;
  }

  const category = categorySelect.value === '__new__' ? newCategoryInput.value.trim() : categorySelect.value;
  const charName = charInput.value.trim();
  const catchCopy = catchInput.value.trim();
  const ts = timestamp();
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const parts = [category, charName, ts].filter(Boolean);
  const baseName = parts.join('_');

  statusEl.textContent = '画像を作成中...';
  saveBtn.disabled = true;

  const imageFile = new File([file], `${baseName}.${ext}`, { type: file.type });
  const BOM = String.fromCharCode(0xFEFF);
  const textContent = `${BOM}【カテゴリ】\n${category}\n\n【キャラ名】\n${charName}\n\n【キャッチコピー】\n${catchCopy}\n`;
  const textFile = new File([textContent], `${baseName}.txt`, { type: 'text/plain;charset=utf-8' });

  let files = [imageFile, textFile];
  try {
    const captionedBlob = await createCaptionedImage(file, charName, catchCopy);
    if (captionedBlob) {
      files.push(new File([captionedBlob], `${baseName}_card.jpg`, { type: 'image/jpeg' }));
    }

    if (navigator.canShare && navigator.canShare({ files })) {
      try {
        await navigator.share({ files });
        statusEl.textContent = `共有シートから「ドライブ」を選び、hasune/${category || '(カテゴリ未選択)'}/${charName || '(キャラ名未入力)'} フォルダに保存してください。`;
      } catch (e) {
        statusEl.textContent = '共有がキャンセルされました。';
      }
    } else {
      files.forEach(downloadFile);
      statusEl.textContent = 'この端末では共有機能が使えないため、ファイルをダウンロードしました。手動でGoogleドライブアプリに移動してください。';
    }
  } finally {
    saveBtn.disabled = false;
  }
});
</script>
</body>
</html>
